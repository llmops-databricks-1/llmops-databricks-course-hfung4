# Project Configuration for LLMOps Course

# Development environment
dev:
  catalog: dev #mlops_dev
  schema: open_alex #henryhfu
  volume: open_alex_files
  llm_endpoint: databricks-llama-4-maverick
  embedding_endpoint: databricks-gte-large-en
  warehouse_id: 7077f4cb0e616c62
  vector_search_endpoint: open_alex_vs_endpoint
  genie_space_id: 01f113061bf41578baff744a41bd9ab0

# Acceptance/Staging environment
acc:
  catalog: staging #mlops_acc
  schema: open_alex #henryhfu
  volume: open_alex_files
  llm_endpoint: databricks-meta-llama-3-1-70b-instruct
  embedding_endpoint: databricks-gte-large-en
  warehouse_id: 7077f4cb0e616c62
  vector_search_endpoint: open_alex_vs_endpoint
  genie_space_id: 01f113061bf41578baff744a41bd9ab0

# Production environment
prd:
  catalog: prod #mlops_prd
  schema: open_alex #henryhfu
  volume: open_alex_files
  llm_endpoint: databricks-meta-llama-3-1-70b-instruct
  embedding_endpoint: databricks-gte-large-en
  warehouse_id: 7077f4cb0e616c62
  vector_search_endpoint: open_alex_vs_endpoint
  genie_space_id: 01f113061bf41578baff744a41bd9ab0

# Shared across all environments
query: "large language models machine learning recommender systems"
max_results: 50  # Maximum papers to fetch per pipeline run, OpenAlex allows up to 200

# Model configuration
model_config:
  temperature: 0.7
  max_tokens: 2000
  top_p: 0.95

# Vector search configuration
vector_search:
  embedding_dimension: 1024
  similarity_metric: cosine
  num_results: 5

# Chunking configuration
chunking:
  chunk_size: 512
  chunk_overlap: 50
  separator: "\n\n"
