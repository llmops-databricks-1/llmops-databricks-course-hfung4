resources:
  jobs:
    data_processing_job:
      name: open-alex-data-processing
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "America/New_York"
        pause_status: ${var.schedule_pause_status}
      tags:
        project_name: "open-alex-curator"
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: "preprocessing"
          environment_key: default
          max_retries: 0
          spark_python_task:
            python_file: ../scripts/01_process_data.py
            parameters:
            - "--env"
            - "${var.env}"
            - "--query"
            - "large language models machine learning recommender systems"
            - "--max-results"
            - "20"
            - "--custom-start-date"
            - "202509010000"
            - "--custom-end-date"
            - "202509300000"
