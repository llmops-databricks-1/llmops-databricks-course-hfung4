resources:
  jobs:
    open_alex_data_ingestion_job:
      name: open_alex_data_ingestion
      tags:
        project_name: "open-alex-curator"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: data_ingestion
          environment_key: default
          max_retries: 0
          notebook_task:
            notebook_path: ../notebooks/1.3_open_alex_data_ingestion.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
